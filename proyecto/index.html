<!DOCTYPE html>
<html lang="es" ng-app="marviApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Marvi Confort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { marvi: { 900: '#0f172a', 800: '#1e293b', accent: '#0ea5e9', light: '#e0f2fe' } } } } }</script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col" ng-controller="MainController">
    <div class="flex-grow flex items-center justify-center bg-gradient-to-br from-marvi-900 to-slate-800">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border-t-4 border-marvi-accent">
            <h1 class="text-3xl font-bold text-center text-marvi-900 mb-2">Marvi Confort</h1>
            <p class="text-sm text-center text-gray-500 mb-8">Automatización de Gastos</p>
            <div ng-show="configError" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-xs font-bold text-center">Error: No se encontró conexion.json</div>
            <form ng-submit="login()">
                <div class="mb-4"><label class="block text-sm font-semibold text-gray-700 mb-1">Usuario</label><input type="text" ng-model="loginData.username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-marvi-accent bg-slate-50" required></div>
                <div class="mb-6"><label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label><input type="password" ng-model="loginData.password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-marvi-accent bg-slate-50" required></div>
                
                <button type="submit" ng-disabled="!apiUrl || loading" class="w-full py-2 text-white bg-marvi-accent rounded-lg shadow-lg disabled:opacity-50 flex justify-center items-center gap-2">
                    <span ng-show="loading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                    {{ loading ? 'Ingresando...' : 'Ingresar' }}
                </button>
                <p class="text-red-500 text-sm mt-3 text-center" ng-show="loginError">Credenciales incorrectas.</p>
            </form>
        </div>
    </div>
</body>
</html>
